<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur Référence ↔ Tri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;700&display=swap');

  :root {
    --bg: #111114;
--surface: #1a1a1f;
--surface2: #22222a;
--border: #32323e;
    --accent: #a8d8b0;
--accent-dim: rgba(168,216,176,0.12);
--accent-glow: rgba(168,216,176,0.20);
    --text: #e8e8f0;
    --muted: #666675;
    --error: #ff5c5c;
    --warn: #ffb347;
    --success: #4dffb0;
    --font-head: 'Outfit', sans-serif;
    --font-mono: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  .wrapper {
    width: 100%;
    max-width: 760px;
  }

  header {
    margin-bottom: 48px;
    text-align: center;
  }

  .badge {
    display: inline-block;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  #histDropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-top: 4px;
  z-index: 10;
  overflow: hidden;
}

.hist-item {
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 10px 14px;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
}

.hist-item:hover {
  background: var(--surface);
  color: var(--accent);
}

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--text);
font-weight: 300;
    font-size: 14px;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    padding: 32px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 15px;
    font-family: var(--font-mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
font-weight: 300;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 520px) {
    .row { grid-template-columns: 1fr; }
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 15px;
    font-family: var(--font-mono);
    color: var(--text);
font-weight: 300;
    letter-spacing: 0.08em;
  }

  input[type="text"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 16px;
    padding: 12px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.08em;
  }

  input[type="text"]:focus, select:focus {
  border-color: var(--accent);
  }

  select option { background: #1f1f24; }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  button {
    cursor: pointer;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 12px 24px;
    border-radius: 4px;
    border: none;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
  color: #0f0f11;
  }

  .btn-primary:hover {
    background: #bde4c6;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    color: var(--text);
    border-color: var(--muted);
  }

  /* Result */
  .result-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    margin-top: 8px;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--accent);
    word-break: break-all;
  }

  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 2px;
    letter-spacing: 0.06em;
  }

  .tag-blue { background: rgba(100,160,255,0.12); color: #88aaff; }
  .tag-green { background: rgba(77,255,176,0.1); color: var(--success); }
  .tag-yellow { background: rgba(255,179,71,0.1); color: var(--warn); }

  /* Masque visual */
  .masque-vis {
    margin-top: 8px;
  }

  .masque-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }

  .masque-chars {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }

  .mc {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    border-radius: 3px;
    transition: all 0.1s;
  }

  .mc-letter {
    background: var(--accent-dim);
    border: 1px solid rgba(200,245,62,0.3);
    color: var(--accent);
  }

  .mc-space {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-size: 9px;
  }

  /* Steps */
  .steps {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .step-pos {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
    color: var(--muted);
  }

  .step-arrow { color: var(--accent); font-weight: 700; }
  .step-char { color: var(--text); }

  /* Error */
 .msg-error {
  white-space: pre-line;
  color: var(--error);
    font-family: var(--font-mono);
    font-size: 15px;
    padding: 12px 16px;
    background: rgba(255,92,92,0.08);
    border: 1px solid rgba(255,92,92,0.25);
    border-radius: 4px;
  }

  .msg-warn {
    color: var(--warn);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px 16px;
    background: rgba(255,179,71,0.08);
    border: 1px solid rgba(255,179,71,0.2);
    border-radius: 4px;
  }

  /* Batch */
  textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px 14px;
    width: 100%;
    height: 130px;
    outline: none;
    resize: vertical;
    letter-spacing: 0.04em;
    line-height: 1.6;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }

  .batch-results {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 300px;
    overflow-y: auto;
  }

  .batch-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .batch-in { color: var(--muted); }
  .batch-arr { color: var(--muted); text-align: center; }
  .batch-out { color: var(--accent); }
  .batch-err { color: var(--error); grid-column: 1/-1; }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.1s;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--muted); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }

  .empty-state {
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    background: var(--surface2);
    border-radius: 6px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  footer {
    margin-top: 40px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--text);
font-weight: 300;
    letter-spacing: 0.06em;
  }

  .direction-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px;
  }

  .dir-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-align: center;
  }
  .dir-btn:hover {
  color: var(--text);
  background: var(--surface);
}

  .dir-btn.active {
    background: var(--accent);
    color: #0f0f11;
    font-weight: 700;
  }

    font-family: var(--font-mono);

    color: var(--muted);

  .scrollbar-custom::-webkit-scrollbar-track { background: var(--surface2); }
  .scrollbar-custom::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

</head>
<body>
<div class="wrapper">

  <header>
    
    <h1>Référence <span>↔</span> Tri</h1>
    <p class="subtitle">Transformation de référence article par masque · MER / MVI / SMA</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('simple')">Saisie unique</button>
    <button class="tab" onclick="switchTab('batch')">Batch (liste)</button>
  </div>

  <!-- SIMPLE TAB -->
  <div id="tab-simple" class="tab-content active">
    <div class="card">
      <div class="card-title">Direction</div>
      <div class="direction-toggle">
        <button class="dir-btn active" id="dir-fwd" onclick="setDirection('fwd')">Référence → Tri</button>
        <span class="dir-label">↔</span>
        <button class="dir-btn" id="dir-inv" onclick="setDirection('inv')">Tri → Référence</button>
      </div>
      <div class="card-title">Paramètres</div>
      <div class="row">
        <div class="field">
          <label>Marque</label>
          <select id="marca">
            <option value="MER">MER</option>
            <option value="MVI">MVI</option>
            <option value="SMA">SMA</option>
          </select>
        </div>
        <div class="field">
          <label id="inputLabel">Référence</label>
          <input type="text" id="refInput" placeholder="ex: A00098630505375" autocomplete="off" spellcheck="false" onfocus="afficherHistorique()" onblur="setTimeout(fermerHistorique, 150)">
        </div>
      </div>
      <div class="row">
  <button class="btn-primary" onclick="convertSimple()">Convertir</button>
  <button class="btn-secondary" onclick="resetSimple()">Effacer</button>
</div>
    </div>

    <div class="card" id="resultCard" style="display:none">
      <div class="card-title">Résultat</div>
      <div id="resultContent"></div>
    </div>
  </div>

  <!-- BATCH TAB -->
  <div id="tab-batch" class="tab-content">
    <div class="card">
      <div class="card-title">Direction</div>
      <div class="direction-toggle">
        <button class="dir-btn active" id="dir-fwd-batch" onclick="setBatchDirection('fwd')">Référence → Tri</button>
        <span class="dir-label">↔</span>
        <button class="dir-btn" id="dir-inv-batch" onclick="setBatchDirection('inv')">Tri → Référence</button>
      </div>
      <div class="card-title">Saisie en masse</div>
      <div class="row">
        <div class="field">
          <label>Marque (commune)</label>
          <select id="marcaBatch">
            <option value="MER">MER</option>
            <option value="MVI">MVI</option>
            <option value="SMA">SMA</option>
          </select>
        </div>
        <div class="field" style="align-self:end">
          <label>&nbsp;</label>
          <p style="font-family:var(--font-mono);font-size:11px;color:var(--muted);padding-top:8px">Une référence par ligne</p>
        </div>
      </div>
      <div class="field">
        <label>Références (une par ligne)</label>
        <textarea id="batchInput" placeholder="A00098630505375&#10;B12345678&#10;C001234567890"></textarea>
      </div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn-primary" onclick="convertBatch()">Convertir tout</button>
        <button class="btn-secondary" onclick="copyBatchResults()">Copier résultats</button>
        <button class="btn-secondary" onclick="document.getElementById('batchInput').value='';document.getElementById('batchResults').innerHTML=''">Effacer</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Résultats batch</div>
      <div id="batchResults" class="batch-results scrollbar-custom">
        <p class="empty-state">Les résultats apparaîtront ici…</p>
      </div>
    </div>
  </div>

  <footer>138 masques chargés · MER · MVI · SMA</footer>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let direction = 'fwd';      // 'fwd' = ref→tri, 'inv' = tri→ref
let batchDirection = 'fwd';

let historique = JSON.parse(localStorage.getItem('refHistorique') || '[]');

function ajouterHistorique(ref) {
  historique = [ref, ...historique.filter(r => r !== ref)].slice(0, 5);
  localStorage.setItem('refHistorique', JSON.stringify(historique));
}

function afficherHistorique() {
  const input = document.getElementById('refInput');
  let dropdown = document.getElementById('histDropdown');
  if (!dropdown) {
    dropdown = document.createElement('div');
    dropdown.id = 'histDropdown';
    input.parentNode.style.position = 'relative';
    input.parentNode.appendChild(dropdown);
  }
  if (!historique.length) return;
  dropdown.innerHTML = historique.map(r =>
    `<div class="hist-item" onclick="selectionnerHistorique('${r}')">${r}</div>`
  ).join('');
  dropdown.style.display = 'block';
}

function selectionnerHistorique(ref) {
  document.getElementById('refInput').value = ref;
  fermerHistorique();
  convertSimple();
}

function fermerHistorique() {
  const d = document.getElementById('histDropdown');
  if (d) d.style.display = 'none';
}

function setDirection(d) {
  direction = d;
  document.getElementById('dir-fwd').classList.toggle('active', d === 'fwd');
  document.getElementById('dir-inv').classList.toggle('active', d === 'inv');
  document.getElementById('inputLabel').textContent = d === 'fwd' ? 'Référence article' : 'Référence de tri';
  document.getElementById('refInput').placeholder = d === 'fwd' ? 'ex: A00098630505375' : 'ex: A98650000  30  5375';
  document.getElementById('resultCard').style.display = 'none';
}

function setBatchDirection(d) {
  batchDirection = d;
  document.getElementById('dir-fwd-batch').classList.toggle('active', d === 'fwd');
  document.getElementById('dir-inv-batch').classList.toggle('active', d === 'inv');
  document.getElementById('batchResults').innerHTML = '<p class="empty-state">Les résultats apparaîtront ici…</p>';
}

// ─── CORE LOGIC ──────────────────────────────────────────────────────────────

function findMasque(marca, ref) {
  const len = ref.length;
  const firstChar = ref[0].toUpperCase();

  // Priority: exact match (marca + firstChar + length), then (marca + firstChar + longueur=0), then fallback (longueur=0, premierChar='')
  let match = MASQUES.find(m => m.marca === marca && m.premierChar === firstChar && m.longueur === len);
  if (!match) match = MASQUES.find(m => m.marca === marca && m.premierChar === firstChar && m.longueur === 0);
  if (!match) match = MASQUES.find(m => m.marca === marca && m.premierChar === '' && m.longueur === 0);
  return match || null;
}

function applyMasque(ref, masqueStr) {
  // Strip trailing spaces to get effective mask, but keep internal spaces
  const trimmed = masqueStr.trimEnd();
  let result = '';
  for (let i = 0; i < trimmed.length; i++) {
    const ch = trimmed[i];
    if (ch === ' ') {
      result += ' ';
    } else {
      // A=1, B=2, C=3...
      const pos = ch.toUpperCase().charCodeAt(0) - 65; // 0-indexed
      if (pos >= 0 && pos < ref.length) {
        result += ref[pos];
      } else {
        result += '?'; // out of bounds
      }
    }
  }
  return result;
}

function applyMasqueInverse(refTri, masqueStr) {
  // refTri has spaces at the same positions as masque
  // Strip trailing spaces for effective mask
  const trimmed = masqueStr.trimEnd();

  // Collect non-space chars from refTri (at positions where masque is a letter)
  const resultLetters = [];
  for (let i = 0; i < trimmed.length; i++) {
    if (trimmed[i] !== ' ') {
      resultLetters.push(refTri[i] !== undefined ? refTri[i] : '?');
    }
  }

  // Reconstruct original ref
  const refLen = resultLetters.length; // number of actual chars
  const ref = new Array(refLen).fill('?');

  let letterIdx = 0;
  for (let i = 0; i < trimmed.length; i++) {
    const ch = trimmed[i];
    if (ch === ' ') continue;
    const origPos = ch.toUpperCase().charCodeAt(0) - 65; // 0-indexed
    if (origPos < refLen) {
      ref[origPos] = resultLetters[letterIdx];
    }
    letterIdx++;
  }
  return ref.join('');
}

function convertInverse(marca, refTri) {
  // We need to find the right mask. Problem: with inverse, we don't know the original
  // first char or length directly. We try all masks for this marca and find the one
  // whose structure (space pattern) matches refTri.
  const candidates = MASQUES.filter(m => m.marca === marca);

  for (const entry of candidates) {
    const trimmed = entry.masque.trimEnd();
    // Check structural match: spaces in same positions, length compatible
    if (trimmed.length !== refTri.length) continue;
    let structMatch = true;
    for (let i = 0; i < trimmed.length; i++) {
      const maskIsSpace = trimmed[i] === ' ';
      const triIsSpace = refTri[i] === ' ';
      if (maskIsSpace !== triIsSpace) { structMatch = false; break; }
    }
    if (!structMatch) continue;

    // Reconstruct
    const ref = applyMasqueInverse(refTri, entry.masque);

    // Validate: applying forward should give back refTri
    const check = applyMasque(ref, entry.masque);
    if (check === refTri) {
      return { result: ref, masque: trimmed, entry };
    }
  }
  return { error: `Aucun masque trouvé correspondant à cette structure de référence de tri.\n\nVérifiez que la taille des espaces sont correctes, parfois il y en a plusieurs à la suite.` };
}


function convert(marca, ref) {
  ref = ref.trim();
  if (!ref) return { error: 'Référence vide.' };

  const entry = findMasque(marca, ref);
  if (!entry) return { error: `Aucun masque trouvé pour ${marca} · 1er char "${ref[0]}" · longueur ${ref.length}.` };

  const result = applyMasque(ref, entry.masque);
  return { result, masque: entry.masque.trimEnd(), entry };
}

// ─── UI ──────────────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['simple','batch'][i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

function convertSimple() {
  const marca = document.getElementById('marca').value;
  const input = document.getElementById('refInput').value;
  if (input.trim()) ajouterHistorique(input.trim());
  const card = document.getElementById('resultCard');
  const content = document.getElementById('resultContent');

  if (!input.trim()) { card.style.display = 'none'; return; }

  let res;
  if (direction === 'fwd') {
    res = convert(marca, input);
  } else {
    res = convertInverse(marca, input);
  }

  const { result, error, masque, entry } = res;
  card.style.display = 'block';

  if (error) {
    content.innerHTML = `<div class="msg-error">⚠ ${error}</div>`;
    return;
  }

  const ref = direction === 'fwd' ? input.trim() : result;
  const masqueVis = masque.split('').map(ch =>
    ch === ' '
      ? `<div class="mc mc-space">·</div>`
      : `<div class="mc mc-letter">${ch}</div>`
  ).join('');

  const effectiveLetters = masque.split('').filter(c => c !== ' ');
  const steps = effectiveLetters.slice(0, 12).map(letter => {
    const pos = letter.toUpperCase().charCodeAt(0) - 65;
    const char = pos < ref.length ? ref[pos] : '?';
    return `<div class="step">
      <div class="step-pos">${pos+1}</div>
      <span style="font-family:var(--font-mono);color:var(--accent)">${letter}</span>
      <span class="step-arrow">→</span>
      <span class="step-char">${char}</span>
    </div>`;
  }).join('');

  const moreSteps = effectiveLetters.length > 12
    ? `<div class="step" style="color:var(--muted)">… +${effectiveLetters.length - 12} positions</div>` : '';

  const dirLabel = direction === 'fwd' ? 'Référence de tri' : 'Référence article';

  content.innerHTML = `
    <div class="result-box">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div class="result-value">${escHtml(result)}</div>
        <button class="copy-btn" onclick="copyText('${escAttr(result)}', this)">Copier</button>
      </div>
      <div class="result-meta">
        <span class="tag tag-blue">${marca}</span>
        <span class="tag tag-green">${dirLabel}</span>
        <span class="tag tag-yellow">Longueur: ${ref.length}</span>
      </div>
    </div>

    <div style="margin-top:16px">
      <div class="masque-label">MascaraOrden appliqué :</div>
      <div class="masque-chars">${masqueVis}</div>
    </div>

    <div class="steps">
      <div class="masque-label" style="margin-bottom:4px">Correspondances (${effectiveLetters.length} caractères) :</div>
      ${steps}${moreSteps}
    </div>
  `;
}

function resetSimple() {
  document.getElementById('refInput').value = '';
  document.getElementById('resultCard').style.display = 'none';
}

function convertBatch() {
  const marca = document.getElementById('marcaBatch').value;
  const lines = document.getElementById('batchInput').value.split('\n').map(l => l.trim()).filter(Boolean);
  const container = document.getElementById('batchResults');

  if (!lines.length) {
    container.innerHTML = '<p class="empty-state">Aucune référence à convertir.</p>';
    return;
  }

  const rows = lines.map(ref => {
    const res = batchDirection === 'fwd' ? convert(marca, ref) : convertInverse(marca, ref);
    const { result, error } = res;
    if (error) {
      return `<div class="batch-row"><span class="batch-err">⚠ ${escHtml(ref)} — ${escHtml(error)}</span></div>`;
    }
    return `<div class="batch-row">
      <span class="batch-in">${escHtml(ref)}</span>
      <span class="batch-arr">→</span>
      <span class="batch-out">${escHtml(result)}</span>
    </div>`;
  }).join('');

  container.innerHTML = rows;
  container.classList.add('scrollbar-custom');
}

function copyBatchResults() {
  const lines = document.getElementById('batchInput').value.split('\n').map(l => l.trim()).filter(Boolean);
  const marca = document.getElementById('marcaBatch').value;
  const results = lines.map(ref => {
    const res = batchDirection === 'fwd' ? convert(marca, ref) : convertInverse(marca, ref);
    const { result, error } = res;
    return error ? `${ref}\tERREUR` : `${ref}\t${result}`;
  }).join('\n');
  navigator.clipboard.writeText(results).catch(() => {});
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 1500);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/'/g,"\\'"); }

// Enter key in input → convert
document.getElementById('refInput').addEventListener('keydown', e => { if (e.key === 'Enter') convertSimple(); });
